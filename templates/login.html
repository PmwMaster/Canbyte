{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center align-items-center min-vh-100">
    <div class="col-md-4">
        <div class="card shadow-lg border-0 bg-dark text-white">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <i class="bi bi-shield-lock text-primary" style="font-size: 3rem;"></i>
                    <h2 class="fw-bold mt-2">FaceID Security</h2>
                    <p class="text-muted">Acesse o painel administrativo</p>
                </div>
                
                <form method="POST">
                    <div class="mb-3">
                        <label for="username" class="form-label">Usuário</label>
                        <div class="input-group">
                            <span class="input-group-text bg-secondary border-0 text-white">
                                <i class="bi bi-person"></i>
                            </span>
                            <input type="text" class="form-control bg-secondary border-0 text-white" id="username" name="username" required placeholder="admin">
                        </div>
                    </div>
                    
                    <div class="mb-4">
                        <label for="password" class="form-label">Senha</label>
                        <div class="input-group">
                            <span class="input-group-text bg-secondary border-0 text-white">
                                <i class="bi bi-key"></i>
                            </span>
                            <input type="password" class="form-control bg-secondary border-0 text-white" id="password" name="password" required placeholder="••••••••">
                        </div>
                    </div>
                    
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary py-2 fw-bold">Entrar</button>
                    </div>
                </form>
                
                <div class="mt-4 text-center">
                    <small class="text-muted">Esqueceu a senha? Entre em contato com o suporte.</small>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
